wikidata:
  name: Wikidata
  url: https://qlever.dev/api/wikidata
  engine: QLever
  default: true
  sort_key: A2
  prefix_map:
    cc: http://creativecommons.org/ns#
    data: https://www.wikidata.org/wiki/Special:EntityData/
    dct: http://purl.org/dc/terms/
    geo: http://www.opengis.net/ont/geosparql#
    geof: http://www.opengis.net/def/function/geosparql/
    imdb: https://www.imdb.com/
    math: http://www.w3.org/2005/xpath-functions/math#
    ontolex: http://www.w3.org/ns/lemon/ontolex#
    owl: http://www.w3.org/2002/07/owl#
    p: http://www.wikidata.org/prop/
    pq: http://www.wikidata.org/prop/qualifier/
    pqn: http://www.wikidata.org/prop/qualifier/value-normalized/
    pqv: http://www.wikidata.org/prop/qualifier/value/
    pr: http://www.wikidata.org/prop/reference/
    prn: http://www.wikidata.org/prop/reference/value-normalized/
    prov: http://www.w3.org/ns/prov#
    prv: http://www.wikidata.org/prop/reference/value/
    ps: http://www.wikidata.org/prop/statement/
    psn: http://www.wikidata.org/prop/statement/value-normalized/
    psv: http://www.wikidata.org/prop/statement/value/
    qfn: http://qlever.cs.uni-freiburg.de/function#
    ql: http://qlever.cs.uni-freiburg.de/builtin-functions/
    qlss: https://qlever.cs.uni-freiburg.de/spatialSearch/
    rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
    rdfs: http://www.w3.org/2000/01/rdf-schema#
    ref: http://www.wikidata.org/reference/
    s: http://www.wikidata.org/entity/statement/
    schema: http://schema.org/
    skos: http://www.w3.org/2004/02/skos/core#
    v: http://www.wikidata.org/value/
    wd: http://www.wikidata.org/entity/
    wdno: http://www.wikidata.org/prop/novalue/
    wdt: http://www.wikidata.org/prop/direct/
    wdtn: http://www.wikidata.org/prop/direct-normalized/
    wikibase: http://wikiba.se/ontology#
    xsd: http://www.w3.org/2001/XMLSchema#
  map_view_url: https://qlever.dev/petrimaps/
  query_templates:
    subject_completion: "# subject completion\n{% include \"prefix_declarations\"\
      \ %}\n{% if search_term %}\nPREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>\n\
      PREFIX wikibase: <http://wikiba.se/ontology#>\nPREFIX skos: <http://www.w3.org/2004/02/skos/core#>\n\
      PREFIX schema: <http://schema.org/>\nSELECT ?qlue_ls_entity (SAMPLE(?name) AS\
      \ ?qlue_ls_label) (SAMPLE(?alias) AS ?qlue_ls_alias) (SAMPLE(?sitelinks) AS\
      \ ?qlue_ls_count) WHERE {\n  {\n    SELECT ?qlue_ls_entity ?name ?alias WHERE\
      \ {\n      ?qlue_ls_entity rdfs:label ?name . FILTER (LANG(?name) = \"en\")\n\
      \      ?qlue_ls_entity skos:altLabel ?alias . FILTER (LANG(?alias) = \"en\"\
      )\n      {% if search_term_uncompressed %}\n      FILTER (REGEX(STR(?qlue_ls_entity),\
      \ \"^{{ search_term_uncompressed }}\"))\n      {% elif search_term %}\n    \
      \  FILTER (REGEX(STR(?name), \"^{{ search_term }}\") || REGEX(STR(?alias), \"\
      ^{{ search_term }}\")) \n      {% endif %}\n    }\n  }\n  ?qlue_ls_entity wikibase:sitelinks\
      \ ?sitelinks\n} GROUP BY ?qlue_ls_entity ORDER BY DESC(?qlue_ls_count)\n{% endif\
      \ %}\nLIMIT {{ limit }} OFFSET {{ offset }}"
    predicate_completion_context_sensitive: "# predicate completion sensitive\n{%\
      \ for prefix in prefixes %}\nPREFIX {{prefix.0}}: <{{prefix.1}}>\n{% endfor\
      \ %}\n{% if subject is not variable %}\nPREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>\n\
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>\nSELECT ?qlue_ls_entity\
      \ (SAMPLE(?name) as ?qlue_ls_label) (SAMPLE(?count) as ?qlue_ls_count) WHERE\
      \ {\n  {\n    SELECT ?qlue_ls_entity (COUNT(?qlue_ls_entity) AS ?count) WHERE\
      \ {\n      {{ local_context }}\n    }\n    GROUP BY ?qlue_ls_entity \n  }\n\
      \  {% if not search_term %}\n  ?qui_tmp_1 ?qui_tmp_2 ?qlue_ls_entity .\n  ?qui_tmp_1\
      \ @en@rdfs:label ?name .\n  BIND (?name AS ?alias)\n  {% elif search_term_uncompressed\
      \ %}\n  ?qui_tmp_1 ?qui_tmp_2 ?qlue_ls_entity .\n  ?qui_tmp_1 @en@rdfs:label\
      \ ?name .\n  FILTER REGEX(STR(?qlue_ls_entity), \"{{ search_term_uncompressed\
      \ }}\", \"i\")\n  {% else %}\n  ?qui_tmp_1 ?qui_tmp_2 ?qlue_ls_entity .\n  ?qui_tmp_1\
      \ @en@rdfs:label ?name .\n  OPTIONAL { ?qui_tmp_1 @en@skos:altLabel ?alias }\n\
      \  FILTER (REGEX(STR(?name), \"{{ search_term }}\", \"i\") || REGEX(STR(?alias),\
      \ \"{{ search_term }}\", \"i\"))\n  {% endif %}\n}\nGROUP BY ?qlue_ls_entity\n\
      ORDER BY DESC(?qlue_ls_count)\n{% else %}\nPREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>\n\
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>\nSELECT ?qlue_ls_entity\
      \ (SAMPLE(?name) as ?qlue_ls_label) (SAMPLE(?count) as ?qlue_ls_count) WHERE\
      \ {\n  {% if not context %}\n  {\n    SELECT ?qlue_ls_entity (COUNT(?qlue_ls_entity)\
      \ AS ?count) WHERE {\n     {{ local_context }}\n    }\n    GROUP BY ?qlue_ls_entity\n\
      \  }\n  {% else %}\n  {\n    SELECT ?qlue_ls_entity (COUNT(DISTINCT {{ subject\
      \ }}) AS ?count) WHERE {\n     {{ context }} {{ local_context }}\n    }\n  \
      \  GROUP BY ?qlue_ls_entity\n  }\n  {% endif %}\n  {% if not search_term %}\n\
      \  ?qui_tmp_1 ?qui_tmp_2 ?qlue_ls_entity .\n  ?qui_tmp_1 @en@rdfs:label ?name\
      \ .\n  BIND (?name AS ?alias)\n  {% elif search_term_uncompressed %}\n  ?qui_tmp_1\
      \ ?qui_tmp_2 ?qlue_ls_entity .\n  ?qui_tmp_1 @en@rdfs:label ?name .\n  FILTER\
      \ REGEX(STR(?qlue_ls_entity), \"{{ search_term_uncompressed }}\", \"i\")\n \
      \ {% else %}\n  ?qui_tmp_1 ?qui_tmp_2 ?qlue_ls_entity .\n  ?qui_tmp_1 @en@rdfs:label\
      \ ?name .\n  OPTIONAL { ?qui_tmp_1 @en@skos:altLabel ?alias }\n  FILTER (REGEX(STR(?name),\
      \ \"{{ search_term }}\", \"i\") || REGEX(STR(?alias), \"{{ search_term }}\"\
      , \"i\"))\n  {% endif %}\n}\nGROUP BY ?qlue_ls_entity\nORDER BY DESC(?qlue_ls_count)\n\
      {% endif %}\nLIMIT {{ limit }} OFFSET {{ offset }}"
    predicate_completion_context_insensitive: |-
      # predicate completion insensitive
      {% for prefix in prefixes %}
      PREFIX {{prefix.0}}: <{{prefix.1}}>
      {% endfor %}
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      SELECT ?qlue_ls_entity (SAMPLE(?name) as ?qlue_ls_label) (SAMPLE(?alias) AS ?qlue_ls_alias) (SAMPLE(?count) as ?qlue_ls_count) WHERE {
        { SELECT ?qlue_ls_entity (COUNT({% if local_context is containing("?qlue_ls_inner") %}DISTINCT ?qlue_ls_inner{%else%}?qlue_ls_entity{% endif %}) as ?count)
          WHERE {
            {{local_context}}
          }
          GROUP BY ?qlue_ls_entity }
        {% if not search_term %}
        ?qui_tmp_1 ?qui_tmp_2 ?qlue_ls_entity .
        ?qui_tmp_1 @en@rdfs:label ?name .
        BIND (?name AS ?alias)
        {% elif search_term_uncompressed %}
        ?qui_tmp_1 ?qui_tmp_2 ?qlue_ls_entity .
        ?qui_tmp_1 @en@rdfs:label ?name .
        FILTER REGEX(STR(?qlue_ls_entity), "{{ search_term_uncompressed }}", "i")
        {% else %}
        ?qui_tmp_1 ?qui_tmp_2 ?qlue_ls_entity .
        ?qui_tmp_1 @en@rdfs:label ?name .
        ?qui_tmp_1 @en@skos:altLabel ?alias .
        FILTER (REGEX(STR(?name), "{{ search_term }}", "i") || REGEX(STR(?alias), "{{ search_term }}", "i"))
        {% endif %}
      } GROUP BY ?qlue_ls_entity ORDER BY DESC(?qlue_ls_count)
      LIMIT {{ limit }} OFFSET {{ offset }}
    object_completion_context_sensitive: |-
      # object completion sensitive
      {% for prefix in prefixes -%}
      PREFIX {{prefix.0}}: <{{prefix.1}}>
      {% endfor -%}
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      SELECT ?qlue_ls_entity (SAMPLE(?name) as ?qlue_ls_label)  (SAMPLE(?alias) AS ?qlue_ls_alias) (SAMPLE(?count) as ?qlue_ls_count) WHERE {
        {
          SELECT ?qlue_ls_entity (COUNT(?qlue_ls_entity) AS ?count) WHERE {
            {{ context }} {{ local_context }}
        }
        GROUP BY ?qlue_ls_entity }
        {% if not search_term %}
        OPTIONAL { ?qlue_ls_entity @en@rdfs:label ?name }
        {% elif search_term_uncompressed %}
        FILTER REGEX(STR(?qlue_ls_entity), "{{ search_term_uncompressed }}", "i")
        {% else %}
        OPTIONAL { ?qlue_ls_entity @en@rdfs:label ?name }
        OPTIONAL { ?qlue_ls_entity @en@skos:altLabel ?optional_alias }
        BIND (COALESCE(?optional_alias, ?qlue_ls_entity) AS ?alias)
        FILTER (REGEX(STR(?name), "^{{ search_term }}") || REGEX(STR(?alias), "^{{ search_term }}"))
        {% endif %}
      }
      GROUP BY ?qlue_ls_entity
      ORDER BY DESC(?qlue_ls_count)
      LIMIT {{ limit }} OFFSET {{ offset }}
    object_completion_context_insensitive: |-
      # object completion insensitive
      {% for prefix in prefixes -%}
      PREFIX {{prefix.0}}: <{{prefix.1}}>
      {% endfor -%}
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      SELECT ?qlue_ls_entity (SAMPLE(?name) as ?qlue_ls_label) (SAMPLE(?alias) as ?qlue_ls_alias) (SAMPLE(?count) as ?qlue_ls_count) WHERE {
        { SELECT ?qlue_ls_entity (COUNT(?qlue_ls_entity) AS ?count) WHERE {
          {{local_context}}
        } GROUP BY ?qlue_ls_entity }
        {% if not search_term %}
        OPTIONAL { ?qlue_ls_entity @en@rdfs:label ?name }
        BIND (?qlue_ls_entity AS ?alias)
        {% elif search_term_uncompressed %}
        FILTER REGEX(STR(?qlue_ls_entity), "{{ search_term_uncompressed }}", "i")
        {% else %}
        OPTIONAL { ?qlue_ls_entity @en@rdfs:label ?name }
        OPTIONAL { ?qlue_ls_entity @en@skos:altLabel ?optional_alias }
        BIND (COALESCE(?optional_alias, ?qlue_ls_entity) AS ?alias)
        FILTER (REGEX(STR(?name), "^{{ search_term }}") || REGEX(STR(?alias), "^{{ search_term }}"))
        {% endif %}
      }
      GROUP BY ?qlue_ls_entity
      ORDER BY DESC(?qlue_ls_count)
      LIMIT {{ limit }} OFFSET {{ offset }}
    values_completion_context_sensitive: |-
      {%- for prefix in prefixes -%}
      PREFIX {{prefix.0}}: <{{prefix.1}}>
      {% endfor -%}
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX wikibase: <http://wikiba.se/ontology#>
      SELECT ?qlue_ls_entity ?qlue_ls_label (GROUP_CONCAT(DISTINCT ?alias; SEPARATOR=", ") AS ?qlue_ls_alias) ?qlue_ls_count WHERE {
        {{ context }} {{ local_context }}
        ?qlue_ls_entity wikibase:sitelinks ?qlue_ls_count .
        OPTIONAL { ?qlue_ls_entity rdfs:label ?qlue_ls_label . FILTER(LANG(?qlue_ls_label) = "en") }
        OPTIONAL { ?qlue_ls_entity skos:altLabel ?alias . FILTER(LANG(?alias) = "en") }
        {% if search_term %}
          FILTER (REGEX(STR(?qlue_ls_label), "^{{ search_term }}") || REGEX(STR(?alias), "^{{ search_term }}"))
        {% endif %}
      }
      GROUP BY ?qlue_ls_entity ?qlue_ls_label ?qlue_ls_count
      ORDER BY DESC(?qlue_ls_count)
      LIMIT {{ limit }}
    values_completion_context_insensitive: |-
      {%- for prefix in prefixes -%}
      PREFIX {{prefix.0}}: <{{prefix.1}}>
      {% endfor -%}
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX wikibase: <http://wikiba.se/ontology#>
      SELECT ?qlue_ls_entity ?qlue_ls_label (GROUP_CONCAT(DISTINCT ?alias; SEPARATOR=", ") AS ?qlue_ls_alias) ?qlue_ls_count WHERE {
        {{ local_context }}
        ?qlue_ls_entity wikibase:sitelinks ?qlue_ls_count .
        OPTIONAL { ?qlue_ls_entity rdfs:label ?qlue_ls_label . FILTER(LANG(?qlue_ls_label) = "en") }
        OPTIONAL { ?qlue_ls_entity skos:altLabel ?alias . FILTER(LANG(?alias) = "en") }
        {% if search_term %}
          FILTER (REGEX(STR(?qlue_ls_label), "^{{ search_term }}") || REGEX(STR(?alias), "^{{ search_term }}"))
        {% endif %}
      }
      GROUP BY ?qlue_ls_entity ?qlue_ls_label ?qlue_ls_count
      ORDER BY DESC(?qlue_ls_count)
      LIMIT {{ limit }}
    hover: |-
      # Hover
      {% include "prefix_declarations" %}
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT ?qlue_ls_label WHERE {
        {{ entity }} rdfs:label ?qlue_ls_label FILTER(LANG(?qlue_ls_label) = "en")
      }
dblp:
  name: DBLP
  url: https://qlever.dev/api/dblp
  engine: QLever
  default: false
  sort_key: A2
  prefix_map:
    dblps: https://dblp.org/rdf/schema-2020-07-01#
    rdfs: http://www.w3.org/2000/01/rdf-schema#
    rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
    wdt: http://www.wikidata.org/prop/direct/
    dblp: https://dblp.org/rdf/schema#
    datacite: http://purl.org/spar/datacite/
    literal: http://purl.org/spar/literal/
    owl: http://www.w3.org/2002/07/owl#
    terms: http://purl.org/dc/terms/
    cito: http://purl.org/spar/cito/
    bibtex: http://purl.org/net/nknouf/ns/bibtex#
    wd: http://www.wikidata.org/entity/
    wikibase: http://wikiba.se/ontology#
    schema: http://schema.org/
    xsd: http://www.w3.org/2001/XMLSchema#
    issn: http://issn.org/resource/ISSN/
    br: https://w3id.org/oc/meta/br/
  map_view_url: https://qlever.dev/petrimaps/
  query_templates:
    subject_completion: |-
      # subject completion
      {% include "prefix_declarations" %}
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX dblp: <https://dblp.org/rdf/schema#>
      SELECT ?qlue_ls_entity (?qlue_ls_alias AS ?qlue_ls_label) ?qlue_ls_alias ?qlue_ls_count WHERE {
        { SELECT ?qlue_ls_entity ?qlue_ls_alias ?qlue_ls_count WHERE {
          { { SELECT ?qlue_ls_entity (COUNT(?paper) AS ?qlue_ls_count) WHERE { ?paper dblp:publishedIn ?qlue_ls_entity } GROUP BY ?qlue_ls_entity } BIND(?qlue_ls_entity AS ?qlue_ls_alias) } UNION
          { { SELECT ?qlue_ls_entity (COUNT(?paper) AS ?qlue_ls_count) WHERE { ?paper dblp:authoredBy ?qlue_ls_entity } GROUP BY ?qlue_ls_entity } ?qlue_ls_entity rdfs:label ?qlue_ls_alias } UNION
          { { SELECT ?qlue_ls_entity (COUNT(?author) AS ?qlue_ls_count) WHERE { ?qlue_ls_entity dblp:authoredBy ?author } GROUP BY ?qlue_ls_entity } ?qlue_ls_entity dblp:title ?qlue_ls_alias }
        } INTERNAL SORT BY ?qlue_ls_alias }
        {% if search_term_uncompressed %}
        FILTER (REGEX(STR(?qlue_ls_entity), "^{{ search_term_uncompressed }}"))
        {% elif search_term %}
        FILTER REGEX(STR(?qlue_ls_alias), "^{{ search_term }}")
        {% endif %}
      } ORDER BY DESC(?qlue_ls_count)
      LIMIT {{ limit }} OFFSET {{ offset }}
    predicate_completion_context_sensitive: |-
      # predicate completion sensitive
      {% include "prefix_declarations" %}
      SELECT ?qlue_ls_entity ?qlue_ls_count WHERE {
        {% if subject is not variable %}
        { { SELECT ?qlue_ls_entity (COUNT(?qui_object) AS ?qlue_ls_count)
          WHERE { {{ local_context }} }
          GROUP BY ?qlue_ls_entity } }
        }
        {% elif not context %}
        { SELECT ?qlue_ls_entity (COUNT(?qlue_ls_entity) AS ?qlue_ls_count)
          WHERE { {{ local_context }} }
          GROUP BY ?qlue_ls_entity }
        {% elif context %}
        { SELECT ?qlue_ls_entity (COUNT(DISTINCT {{ subject }}) AS ?qlue_ls_count)
          WHERE { {{ context }} {{ local_context }} }
          GROUP BY ?qlue_ls_entity }
        {% endif %}
        {% if search_term_uncompressed %}
        FILTER (REGEX(STR(?qlue_ls_entity), "^{{ search_term_uncompressed }}"))
        {% elif search_term %}
        FILTER REGEX(STR(?qlue_ls_entity), "{{ search_term }}", "i")
        {% endif %}
      } ORDER BY DESC(?qlue_ls_count)
      LIMIT {{ limit }} OFFSET {{ offset }}
    predicate_completion_context_insensitive: |-
      # predicate completion insensitive
      {% include "prefix_declarations" %}
      SELECT ?qlue_ls_entity ?qlue_ls_score WHERE {
        { SELECT ?qlue_ls_entity (COUNT({% if local_context is containing("?qlue_ls_inner") %}DISTINCT ?qlue_ls_inner{%else%}?qlue_ls_entity{% endif %}) AS ?qlue_ls_score)
          WHERE {
            {{local_context}}
          }
          GROUP BY ?qlue_ls_entity }
        BIND (?qlue_ls_entity AS ?qlue_ls_label)
        {% if search_term_uncompressed %}
        FILTER (REGEX(STR(?qlue_ls_entity), "^{{ search_term_uncompressed }}"))
        {% elif search_term %}
        FILTER REGEX(STR(?qlue_ls_label), "{{ search_term }}", "i")
        {% endif %}
      } ORDER BY DESC(?qlue_ls_score)
      LIMIT {{ limit }} OFFSET {{ offset }}
    object_completion_context_sensitive: |-
      # object completion sensitive
      {% include "prefix_declarations" %}
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT ?qlue_ls_entity ?qlue_ls_label ?qlue_ls_count WHERE {
        { SELECT ?qlue_ls_entity (COUNT(?qlue_ls_entity) AS ?qlue_ls_count) WHERE {
          {{ context }} {{ local_context }} .
        } GROUP BY ?qlue_ls_entity }
        OPTIONAL { ?qlue_ls_entity rdfs:label ?qlue_ls_label }
        {% if search_term_uncompressed %}
        FILTER (REGEX(STR(?qlue_ls_entity), "^{{ search_term_uncompressed }}"))
        {% elif search_term %}
        FILTER (REGEX(STR(?qlue_ls_entity), "^{{ search_term }}") || REGEX(STR(?qlue_ls_label), "^{{ search_term }}"))
        {% endif %}
      } ORDER BY DESC(?qlue_ls_count)
      LIMIT {{ limit }} OFFSET {{ offset }}
    object_completion_context_insensitive: |-
      # object completion insensitive
      {% include "prefix_declarations" %}
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT ?qlue_ls_entity ?qlue_ls_label ?qlue_ls_count WHERE {
        { SELECT ?qlue_ls_entity (COUNT(?qlue_ls_entity) AS ?qlue_ls_count) WHERE {
          {{local_context}}
        } GROUP BY ?qlue_ls_entity }
        OPTIONAL { ?qlue_ls_entity rdfs:label ?qlue_ls_label }
        {% if search_term_uncompressed %}
        FILTER (REGEX(STR(?qlue_ls_entity), "^{{ search_term_uncompressed }}"))
        {% elif search_term %}
        FILTER (REGEX(STR(?qlue_ls_entity), "^{{ search_term }}") || REGEX(STR(?qlue_ls_label), "^{{ search_term }}"))
        {% endif %}
      } ORDER BY DESC(?qlue_ls_count)
      LIMIT {{ limit }} OFFSET {{ offset }}
    values_completion_context_sensitive: ''
    values_completion_context_insensitive: ''
    hover: ''
osm-planet:
  name: OSM planet
  url: https://qlever.dev/api/osm-planet
  engine: QLever
  default: false
  sort_key: A3
  prefix_map:
    osmmeta: https://www.openstreetmap.org/meta/
    osmway: https://www.openstreetmap.org/way/
    osmkey: 'https://www.openstreetmap.org/wiki/Key:'
    osmrel: https://www.openstreetmap.org/relation/
    osmnode: https://www.openstreetmap.org/node/
    rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
    rdfs: http://www.w3.org/2000/01/rdf-schema#
    osm: https://www.openstreetmap.org/
    ogc: http://www.opengis.net/rdf#
    xsd: http://www.w3.org/2001/XMLSchema#
    wd: http://www.wikidata.org/entity/
    wdt: http://www.wikidata.org/prop/direct/
    p: http://www.wikidata.org/prop/
    ps: http://www.wikidata.org/prop/statement/
    pq: http://www.wikidata.org/prop/qualifier/
    geo: http://www.opengis.net/ont/geosparql#
    geof: http://www.opengis.net/def/function/geosparql/
    osm2rdf: https://osm2rdf.cs.uni-freiburg.de/rdf#
    osm2rdfkey: https://osm2rdf.cs.uni-freiburg.de/rdf/key#
    osm2rdfgeom: https://osm2rdf.cs.uni-freiburg.de/rdf/geom#
    osm2rdfmember: https://osm2rdf.cs.uni-freiburg.de/rdf/member#
  map_view_url: https://qlever.dev/petrimaps/
  query_templates:
    subject_completion: |-
      # subject completion
      {% include "prefix_declarations" %}
      {% if search_term %}
      PREFIX osmkey: <https://www.openstreetmap.org/wiki/Key:>
      PREFIX osmrel: <https://www.openstreetmap.org/relation/>
      PREFIX rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
      PREFIX osm: <https://www.openstreetmap.org/>
      PREFIX osm2rdf: <https://osm2rdf.cs.uni-freiburg.de/rdf#>
      SELECT ?qlue_ls_entity (SAMPLE(?name) AS ?qlue_ls_label) (SAMPLE(?alias) AS ?qlue_ls_alias) (SAMPLE(?count) AS ?qlue_ls_count) WHERE {
        {
          {
            SELECT ?qlue_ls_entity ?name ?alias WHERE {
              {
                ?qlue_ls_entity osmkey:name ?name BIND(?name AS ?alias)
                {% if search_term_uncompressed %}
                FILTER (REGEX(STR(?qlue_ls_entity), "^{{ search_term_uncompressed }}"))
                {% elif search_term %}
                FILTER REGEX(STR(?name), "^{{ search_term }}")
                {% endif %}
              } UNION
              {
                ?qlue_ls_entity osmkey:name ?name .
                ?qlue_ls_entity osmkey:name:en ?alias
                {% if search_term_uncompressed %}
                FILTER (REGEX(STR(?qlue_ls_entity), "^{{ search_term_uncompressed }}"))
                {% elif search_term %}
                FILTER REGEX(STR(?alias), "^{{ search_term }}")
                {% endif %}
              }
          }
        }
